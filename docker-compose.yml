services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: medicacare_app

    working_dir: /var/www

    volumes:
      - .:/var/www

    ports:
      - "5173:5173"

    depends_on:
      - postgres

  postgres:
    image: postgres:17

    container_name: medicacare_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: medicacare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest

    container_name: medicacare_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

volumes:
  postgres_data: